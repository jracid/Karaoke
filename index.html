<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videoke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0c13;
    --panel: #141724;
    --panel-2: #1b1f30;
    --line: #262b3d;
    --ink: #eef0f7;
    --ink-dim: #8a8fa3;
    --accent: #3b82f6;
    --accent-soft: rgba(59,130,246,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }

  .shell{
    width:100%;
    max-width:1200px;
    padding:20px 16px 50px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:800;
    font-size:22px;
    letter-spacing:-0.5px;
  }
  .brand span{ color:var(--accent); }
  .tagline{ font-size:11.5px; color:var(--ink-dim); letter-spacing:0.5px; }

  /* ===== STAGE ===== */
  .stage{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .stage-media{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
  }
  #ytHost{ position:absolute; inset:0; }
  #ytPlayerTarget{ width:100%; height:100%; display:block; }
  #ytPlayerTarget iframe, iframe#ytPlayerTarget{ width:100% !important; height:100% !important; border:0; display:block; }
  .stage-placeholder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 30% 20%, rgba(59,130,246,0.20), transparent 55%),
      radial-gradient(circle at 75% 75%, rgba(232,74,155,0.14), transparent 50%),
      #0d1018;
    transition: opacity .2s ease;
  }
  .stage-placeholder.hidden{ opacity:0; pointer-events:none; }
  .neon{
    text-align:center;
    font-family:'Fraunces', serif;
    font-weight:800;
    line-height:1.05;
  }
  .neon .mic{ display:block; margin:0 auto 8px; color:#fff; filter:drop-shadow(0 0 10px rgba(59,130,246,0.6)); }
  .neon .l1{
    display:block;
    font-size:clamp(26px, 5vw, 42px);
    color:#fff;
    text-shadow: 0 0 6px rgba(255,255,255,0.5), 0 0 24px var(--accent);
    letter-spacing:2px;
  }
  .neon .l2{
    display:block;
    font-size:clamp(16px, 3vw, 22px);
    color:var(--accent);
    text-shadow: 0 0 6px rgba(59,130,246,0.7), 0 0 20px rgba(59,130,246,0.5);
    letter-spacing:6px;
    margin-top:4px;
  }
  .now-playing{
    padding:14px 16px;
    border-top:1px solid var(--line);
  }
  .np-status{
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    margin-bottom:2px;
  }
  .np-title{
    font-size:13px;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  #skipBtn{
    flex-shrink:0;
    font-size:12px;
    font-weight:600;
    color:var(--accent);
    background:transparent;
    border:1px solid var(--accent);
    border-radius:7px;
    padding:5px 12px;
    cursor:pointer;
    display:none;
    align-items:center;
    gap:5px;
  }
  #skipBtn.show{ display:inline-flex; }

  /* ===== TABS ===== */
  .tabs{
    display:flex;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:6px;
  }
  .tab{
    flex:1;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:12.5px;
    color:var(--ink-dim);
    background:transparent;
    border:1px solid transparent;
    border-radius:8px;
    padding:10px 6px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition: all .15s ease;
  }
  .tab svg{ flex-shrink:0; }
  .tab.active{
    color:var(--ink);
    background:var(--accent-soft);
    border-color:var(--accent);
  }
  .tab .count{
    font-size:11px;
    background:var(--panel-2);
    color:var(--ink-dim);
    border-radius:999px;
    padding:1px 7px;
  }
  .tab.active .count{ color:var(--accent); }

  /* ===== PANELS ===== */
  .panel.hidden{ display:none; }

  .search-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  #songInput{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--ink);
    font-size:14px;
    padding:12px 14px;
    outline:none;
  }
  #songInput:focus{ border-color:var(--accent); }
  #searchBtn{
    font-weight:600;
    font-size:13px;
    border:none;
    border-radius:9px;
    padding:0 18px;
    cursor:pointer;
    color:#0a0c13;
    background:var(--accent);
  }
  #searchBtn:disabled{ opacity:.5; cursor:not-allowed; }

  .list{ display:flex; flex-direction:column; gap:2px; }
  .row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 6px;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{ border-bottom:none; }
  .row img{
    width:56px; height:56px;
    border-radius:8px;
    object-fit:cover;
    flex-shrink:0;
    background:var(--panel-2);
  }
  .row-body{ flex:1; min-width:0; }
  .row-title{
    font-size:13.5px;
    font-weight:600;
    line-height:1.3;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
  }
  .row-sub{ font-size:11.5px; color:var(--ink-dim); margin-top:2px; }
  .row-btn{
    flex-shrink:0;
    font-size:12.5px;
    font-weight:600;
    color:var(--accent);
    background:transparent;
    border:1px solid var(--accent);
    border-radius:8px;
    padding:7px 14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .row-btn:hover{ background:var(--accent-soft); }
  .row-remove{
    flex-shrink:0;
    font-size:16px;
    color:var(--ink-dim);
    background:transparent;
    border:none;
    cursor:pointer;
    padding:4px 8px;
  }
  .row-remove:hover{ color:#f06565; }

  .empty-msg, .loading{
    text-align:center;
    color:var(--ink-dim);
    font-size:13px;
    padding:30px 10px;
  }

  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);
    border:1px solid var(--accent);
    color:var(--ink);
    font-size:13px;
    font-weight:500;
    padding:10px 18px;
    border-radius:999px;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:100;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ===== LANDSCAPE / WIDE LAYOUT ===== */
  @media (min-width:760px){
    .shell{ padding-top:26px; }
    .main{
      display:grid;
      grid-template-columns: 400px 1fr;
      gap:18px;
      align-items:start;
    }
    .stage{ position:sticky; top:20px; }
    .right-col{ display:flex; flex-direction:column; gap:16px; }
  }
</style>
</head>
<body>
  <div class="shell">

    <header>
      <div class="brand">Video<span>ke</span></div>
      <div class="tagline">SEARCH • SING • ULITIN</div>
    </header>

    <div class="main">
      <div class="stage" id="stage">
        <div class="stage-media">
          <div id="ytHost"><div id="ytPlayerTarget"></div></div>
          <div class="stage-placeholder" id="stagePlaceholder">
            <div class="neon">
              <svg class="mic" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              <span class="l1">KARAOKE</span>
              <span class="l2">NIGHT</span>
            </div>
          </div>
        </div>
        <div class="now-playing">
          <div class="np-status" id="npStatus">Waiting for a song…</div>
          <div class="np-title">
            <span id="npTitle">Maghanap at magdagdag ng kanta para magsimula!</span>
            <button id="skipBtn" onclick="skipSong()">Skip <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l10 8-10 8V4zM18 4h2v16h-2V4z"/></svg></button>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="tabs">
          <button class="tab active" data-tab="popular" onclick="switchTab('popular')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
            Popular
          </button>
          <button class="tab" data-tab="search" onclick="switchTab('search')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
            Search
          </button>
          <button class="tab" data-tab="reserved" onclick="switchTab('reserved')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            Reserved <span class="count" id="queueCount">0</span>
          </button>
        </div>

        <div class="panel" id="panel-popular">
          <div class="list" id="popularList"><div class="loading">Naglo-load…</div></div>
        </div>

        <div class="panel hidden" id="panel-search">
          <div class="search-row">
            <input id="songInput" type="text" placeholder="Pamagat ng kanta o artist" />
            <button id="searchBtn" onclick="doSearch()">Maghanap</button>
          </div>
          <div class="list" id="searchList"></div>
        </div>

        <div class="panel hidden" id="panel-reserved">
          <div class="list" id="reservedList">
            <div class="empty-msg">Wala pang laman ng queue. Mag-search at pindutin ang Play.</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

<script>
  // Client-side key — visible in page source. Restrict it in Google Cloud
  // Console (API restriction: YouTube Data API v3; website restriction to
  // your hosting domain) to reduce misuse.
  const API_KEY = "AIzaSyB6I_P_yhytQYiGkIRNuLpUnQOnWv0gRLw";

  // ---------- State ----------
  let queue = [];              // reserved queue
  let nowPlaying = null;       // currently playing item
  let reservedIds = new Set(); // videoIds currently queued or playing (blocks duplicates)
  let ytPlayer = null;
  let ytReady = false;
  let popularLoaded = false;
  let allRows = [];            // every rendered row, so we can refresh their state together

  const ICON_PLAY = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>';
  const ICON_ADD = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
  const ICON_CHECK = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const ICON_X = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';

  // ---------- YouTube IFrame API ----------
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function(){
    ytReady = true;
  };

  function ensurePlayer(videoId){
    if(ytPlayer){
      ytPlayer.loadVideoById(videoId);
      return;
    }
    ytPlayer = new YT.Player('ytPlayerTarget', {
      videoId: videoId,
      playerVars: { autoplay: 1, rel: 0, playsinline: 1, origin: window.location.origin || undefined },
      events: {
        onStateChange: (e) => {
          if(e.data === YT.PlayerState.ENDED){
            playNext();
          }
        }
      }
    });
  }

  // ---------- Playback / Queue ----------
  function addOrPlay(item){
    if(reservedIds.has(item.videoId)) return; // already queued or playing — ignore
    reservedIds.add(item.videoId);

    if(!nowPlaying){
      playNow(item);
    } else {
      queue.push(item);
      renderQueue();
      showToast(`Na-reserve: ${item.title}`);
    }
    refreshAllRowStates();
  }

  function playNow(item){
    nowPlaying = item;
    document.getElementById('stagePlaceholder').classList.add('hidden');
    document.getElementById('npStatus').textContent = 'Ngayon kumakanta:';
    document.getElementById('npTitle').textContent = item.title;
    document.getElementById('skipBtn').classList.toggle('show', queue.length > 0);

    if(ytReady){
      ensurePlayer(item.videoId);
    } else {
      window.onYouTubeIframeAPIReady = function(){
        ytReady = true;
        ensurePlayer(item.videoId);
      };
    }
  }

  function playNext(){
    if(nowPlaying) reservedIds.delete(nowPlaying.videoId);

    if(queue.length > 0){
      const next = queue.shift();
      renderQueue();
      playNow(next);
    } else {
      nowPlaying = null;
      document.getElementById('stagePlaceholder').classList.remove('hidden');
      document.getElementById('npStatus').textContent = 'Waiting for a song…';
      document.getElementById('npTitle').textContent = 'Maghanap at magdagdag ng kanta para magsimula!';
      document.getElementById('skipBtn').classList.remove('show');
    }
    refreshAllRowStates();
  }

  function skipSong(){ playNext(); }

  function removeFromQueue(index){
    const removed = queue.splice(index, 1)[0];
    if(removed) reservedIds.delete(removed.videoId);
    renderQueue();
    refreshAllRowStates();
  }

  function renderQueue(){
    document.getElementById('queueCount').textContent = queue.length;
    document.getElementById('skipBtn').classList.toggle('show', !!nowPlaying && queue.length > 0);

    const wrap = document.getElementById('reservedList');
    if(queue.length === 0){
      wrap.innerHTML = '<div class="empty-msg">Wala pang laman ng queue. Mag-search at i-reserve ang kanta.</div>';
      return;
    }
    wrap.innerHTML = '';
    queue.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <img src="${item.thumb}" alt="">
        <div class="row-body">
          <div class="row-title"></div>
          <div class="row-sub">Pila #${i+1}</div>
        </div>
      `;
      row.querySelector('.row-title').textContent = item.title;
      const rm = document.createElement('button');
      rm.className = 'row-remove';
      rm.innerHTML = ICON_X;
      rm.setAttribute('aria-label', 'Alisin sa pila');
      rm.onclick = () => removeFromQueue(i);
      row.appendChild(rm);
      wrap.appendChild(row);
    });
  }

  function refreshAllRowStates(){
    allRows.forEach(({el, item}) => applyRowState(el, item));
  }

  function applyRowState(row, item){
    const btn = row.querySelector('.row-btn');
    if(!btn) return;
    if(nowPlaying && nowPlaying.videoId === item.videoId){
      btn.innerHTML = `${ICON_CHECK} Kumakanta`;
      btn.disabled = true;
    } else if(reservedIds.has(item.videoId)){
      btn.innerHTML = `${ICON_CHECK} Naka-reserve`;
      btn.disabled = true;
    } else if(!nowPlaying){
      btn.innerHTML = `${ICON_PLAY} Kantahin`;
      btn.disabled = false;
    } else {
      btn.innerHTML = `${ICON_ADD} I-reserve`;
      btn.disabled = false;
    }
  }

  // ---------- UI helpers ----------
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function buildRow(item){
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <img src="${item.thumb}" alt="">
      <div class="row-body">
        <div class="row-title"></div>
        <div class="row-sub"></div>
      </div>
    `;
    row.querySelector('.row-title').textContent = item.title;
    row.querySelector('.row-sub').textContent = item.channel;

    const btn = document.createElement('button');
    btn.className = 'row-btn';
    btn.onclick = () => addOrPlay(item);
    row.appendChild(btn);

    applyRowState(row, item);
    allRows.push({ el: row, item });
    return row;
  }

  function renderList(container, items){
    allRows = allRows.filter(r => r.el.isConnected); // drop rows no longer in the DOM
    container.innerHTML = '';
    if(items.length === 0){
      container.innerHTML = '<div class="empty-msg">Walang nahanap. Subukan ang ibang keyword.</div>';
      return;
    }
    items.forEach(item => container.appendChild(buildRow(item)));
  }

  // ---------- Tabs ----------
  function switchTab(name){
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.getElementById('panel-popular').classList.toggle('hidden', name !== 'popular');
    document.getElementById('panel-search').classList.toggle('hidden', name !== 'search');
    document.getElementById('panel-reserved').classList.toggle('hidden', name !== 'reserved');

    if(name === 'popular' && !popularLoaded){
      popularLoaded = true;
      fetchSongs('OPM videoke karaoke classics', document.getElementById('popularList'));
    }
  }

  // ---------- YouTube search ----------
  async function fetchSongs(query, container){
    container.innerHTML = '<div class="loading">Naglo-load…</div>';
    try {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=15&videoEmbeddable=true&q=${encodeURIComponent(query)}&key=${encodeURIComponent(API_KEY)}`;
      const res = await fetch(url);
      const data = await res.json();

      if(data.error){
        container.innerHTML = `<div class="empty-msg">API error: ${data.error.message}</div>`;
        return;
      }

      const items = (data.items || []).map(it => ({
        videoId: it.id.videoId,
        title: it.snippet.title,
        channel: it.snippet.channelTitle,
        thumb: it.snippet.thumbnails.medium.url
      }));
      renderList(container, items);
    } catch(err){
      container.innerHTML = `<div class="empty-msg">Nabigo: ${err.message}</div>`;
    }
  }

  function doSearch(){
    const raw = document.getElementById('songInput').value.trim();
    if(!raw) return;
    const query = /videoke|karaoke/i.test(raw) ? raw : raw + ' karaoke videoke';
    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    fetchSongs(query, document.getElementById('searchList')).finally(() => btn.disabled = false);
  }

  document.getElementById('songInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') doSearch();
  });

  // load popular on first paint
  switchTab('popular');
</script>
</body>
</html>
